name: Deploy OpenClaw Relay Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Landing Page
        run: |
          cd landing-page
          npm install
          npm run build

      - name: Build Dashboard
        run: |
          cd dashboard
          npm install
          npm run build
        env:
          NEXT_PUBLIC_RELAY_URL: ${{ secrets.NEXT_PUBLIC_RELAY_URL }}

      - name: Merge Builds
        run: |
          mkdir deploy
          cp -r landing-page/out/* deploy/
          mkdir -p deploy/dashboard
          cp -r dashboard/out/* deploy/dashboard/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "deploy"
          output_location: ""
          skip_app_build: true
          skip_api_build: true
